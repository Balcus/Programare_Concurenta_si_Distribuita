name = "DbConfig";
version = 1.0;
active_profile = "staging";

profiles = {
    staging = {
        operations = (
            { action = "add";    
              key = "DB_HOST";    
              value = "localhost"; 
            },
            { action = "add";
              key = "DB_PORT";    
              value = "5433"; 
            },
            { action = "add";    
              key = "DB_USER";    
              value = "postgres"; 
            },
            { action = "add";    
              key = "DB_PASS";    
              value = "admin"; 
            },
            { 
              action = "format"; 
              key    = "DB_CONNECTION_STRING"; 
              value  = "postgres://%s:%s@%s:%s"; 
            },
            {
              action = "print";
              key = "DB_CONNECTION_STRING";
              value = "";
            },
        );
    };
};